<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>AcousticNet - Dashboard</title>
  </head>
  <body>
    <h1>hello world - AcousticNet frontend</h1>
    <p>Consultando backend...</p>
    <pre id="resposta"></pre>

    <script>
      fetch("/api/hello")
        .then((response) => response.json())
        .then((data) => {
          document.getElementById("resposta").textContent = JSON.stringify(
            data,
            null,
            2,
          );
        });
    </script>
  </body>
</html>
